<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>القائمة العلوية - موقع التمويل</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ملف CSS الخارجي -->
  <link rel="stylesheet" href="navbar.css" />
</head>
<body>

  <!-- ===== شريط التنبيه العلوي ===== -->
  <div class="top-bar">
    <p>خدمة العملاء: <a href="tel:920000000">9200 00 000</a> | متاحون 24/7</p>
  </div>

  <!-- ===== القائمة العلوية ===== -->
  <header class="site-header">
    <nav class="navbar" role="navigation" aria-label="القائمة الرئيسية">
      <div class="navbar__container">

        <!-- ➊ الشعار — جهة اليمين (RTL) -->
        <a href="index.html" class="navbar__logo" aria-label="الصفحة الرئيسية">
          <!-- يمكن استبدال النص بـ <img> عند توفر الشعار -->
          <div class="logo-placeholder">
            <span class="logo-placeholder__icon">&#9670;</span>
            <span class="logo-placeholder__text">تمويل <strong>بلس</strong></span>
          </div>
        </a>

        <!-- ➋ روابط التنقل — المنتصف -->
        <ul class="navbar__menu" id="navbar-menu" role="list" aria-label="روابط التنقل">
          <li class="navbar__item">
            <a href="index.html" class="navbar__link active">
              الرئيسية
            </a>
          </li>
          <li class="navbar__item">
            <a href="car-finance.html" class="navbar__link">
              تمويل السيارات
            </a>
          </li>
          <li class="navbar__item">
            <a href="cash-finance.html" class="navbar__link">
              التمويل النقدي
            </a>
          </li>
          <li class="navbar__item">
            <a href="business-finance.html" class="navbar__link">
              تمويل الشركات
            </a>
          </li>
        </ul>

        <!-- ➌ زر الإجراء — جهة اليسار (RTL) -->
        <div class="navbar__actions">
          <a href="apply.html" class="btn-apply">
            <span class="btn-apply__icon">✦</span>
            قدّم طلبك
          </a>
        </div>

        <!-- ➍ زر الهامبرغر — للجوال فقط -->
        <button
          class="navbar__toggle"
          id="navbar-toggle"
          aria-controls="navbar-menu"
          aria-expanded="false"
          aria-label="فتح القائمة"
        >
          <span class="hamburger">
            <span class="hamburger__line"></span>
            <span class="hamburger__line"></span>
            <span class="hamburger__line"></span>
          </span>
        </button>

      </div>
    </nav>
  </header>

  <!-- ===== القائمة الجانبية للجوال (Sidebar) ===== -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <aside class="sidebar" id="sidebar" aria-label="القائمة الجانبية" aria-hidden="true">

    <!-- رأس الـ Sidebar -->
    <div class="sidebar__header">
      <div class="logo-placeholder logo-placeholder--white">
        <span class="logo-placeholder__icon">&#9670;</span>
        <span class="logo-placeholder__text">تمويل <strong>بلس</strong></span>
      </div>
      <button class="sidebar__close" id="sidebar-close" aria-label="إغلاق القائمة">
        &times;
      </button>
    </div>

    <!-- روابط الـ Sidebar -->
    <nav aria-label="قائمة جانبية">
      <ul class="sidebar__menu" role="list">
        <li>
          <a href="index.html" class="sidebar__link active">
            <span class="sidebar__link-icon">🏠</span>
            الرئيسية
          </a>
        </li>
        <li>
          <a href="car-finance.html" class="sidebar__link">
            <span class="sidebar__link-icon">🚗</span>
            تمويل السيارات
          </a>
        </li>
        <li>
          <a href="cash-finance.html" class="sidebar__link">
            <span class="sidebar__link-icon">💵</span>
            التمويل النقدي
          </a>
        </li>
        <li>
          <a href="business-finance.html" class="sidebar__link">
            <span class="sidebar__link-icon">🏢</span>
            تمويل الشركات
          </a>
        </li>
      </ul>
    </nav>

    <!-- زر الطلب داخل الـ Sidebar -->
    <div class="sidebar__footer">
      <a href="apply.html" class="btn-apply btn-apply--full">
        <span class="btn-apply__icon">✦</span>
        قدّم طلبك الآن
      </a>
    </div>

  </aside>

  <!-- ===== JavaScript لتشغيل الهامبرغر ===== -->
  <script>
    const toggle       = document.getElementById('navbar-toggle');
    const sidebar      = document.getElementById('sidebar');
    const overlay      = document.getElementById('sidebar-overlay');
    const closeBtn     = document.getElementById('sidebar-close');

    function openSidebar() {
      sidebar.classList.add('is-open');
      overlay.classList.add('is-visible');
      toggle.setAttribute('aria-expanded', 'true');
      sidebar.setAttribute('aria-hidden', 'false');
      toggle.classList.add('is-active');
      document.body.style.overflow = 'hidden'; // منع التمرير خلف القائمة
    }

    function closeSidebar() {
      sidebar.classList.remove('is-open');
      overlay.classList.remove('is-visible');
      toggle.setAttribute('aria-expanded', 'false');
      sidebar.setAttribute('aria-hidden', 'true');
      toggle.classList.remove('is-active');
      document.body.style.overflow = '';
    }

    toggle.addEventListener('click', () => {
      sidebar.classList.contains('is-open') ? closeSidebar() : openSidebar();
    });

    overlay.addEventListener('click', closeSidebar);
    closeBtn.addEventListener('click', closeSidebar);

    // إغلاق عند الضغط على Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSidebar();
    });
  </script>

</body>
</html>
